<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <link rel="stylesheet" href="style.css" />

    <script src="https://momentjs.com/downloads/moment.min.js"></script>
    <script src="https://momentjs.com/downloads/moment-timezone-with-data.min.js"></script>
  </head>
  <body>
    <div class="container">
      <h1>🌍 World Clock</h1>

      <div class="clock">
        <h2>Johannesburg</h2>

        <div class="date" id="johannesburg-date"></div>

        <div class="time" id="johannesburg-time"></div>
      </div>

      <div class="clock">
        <div>
          <h2>London</h2>
          <div class="date" id="london-date"></div>
        </div>

        <div class="time" id="london-time"></div>
      </div>

      <div class="clock">
        <div>
          <h2>New York</h2>
          <div class="date" id="newyork-date"></div>
        </div>

        <div class="time" id="newyork-time"></div>
      </div>
    </div>

    <footer>
      <a>Coded by Carol Maf</a>
      <a
        href="https://github.com/carol576-cpu/singlelocation-project.git"
        target="_blank"
      >
        Open-source on GitHub
      </a>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
